# .github/workflows/terraform.yml
#
# On PR  → fmt-check + validate + tfsec scan + plan (plan posted as PR comment)
# On push main → same validate jobs (no auto-apply; apply is always a deliberate CLI action)
#
# Auth: OIDC federation — no long-lived AWS keys in GitHub secrets (Q17 answer).
# CI role is read-only: plan + state lock only. Apply requires a human with a higher-privilege role.

name: terraform

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  id-token: write    # required for OIDC token exchange with AWS STS
  contents: read
  pull-requests: write

env:
  TF_VERSION: "1.11.0"
  AWS_REGION: "us-east-1"
  CI_ROLE: "arn:aws:iam::570461445597:role/github-ci-cloud-engineer"

jobs:
  validate:
    name: fmt / validate / scan / plan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # ── 1. Format (no AWS needed) ──────────────────────────────────────────
      - name: fmt check
        run: terraform fmt -check -recursive

      # ── 2. OIDC → short-lived AWS creds ────────────────────────────────────
      # Replaces static AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY in secrets.
      # Role is scoped to this repo only (sub condition in trust policy).
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6.2.2
        with:
          role-to-assume: ${{ env.CI_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      # ── 3. Init against dev backend ─────────────────────────────────────────
      - name: terraform init
        run: terraform init -backend-config=envs/dev.backend.hcl

      # ── 4. Validate (syntax + provider schema) ──────────────────────────────
      - name: terraform validate
        run: terraform validate

      # ── 5. Shift-left security scan ──────────────────────────────────────────
      # tfsec catches open SGs, unencrypted storage, missing deletion_protection, etc.
      # before any infra is provisioned. soft_fail=true: warns on findings, doesn't block CI.
      - name: tfsec
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: .
          soft_fail: true

      # ── 6. Plan + post as PR comment ────────────────────────────────────────
      - name: terraform plan
        id: plan
        run: terraform plan -var-file=envs/dev.tfvars -no-color 2>&1 | tee plan.out

      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('plan.out', 'utf8');
            const truncated = plan.length > 60000 ? plan.slice(0, 60000) + '\n...(truncated)' : plan;
            const body = `### Terraform Plan (dev)\n\`\`\`\n${truncated}\n\`\`\``;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number
            });
            const existing = comments.find(c => c.body.startsWith('### Terraform Plan'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body
              });
            }
